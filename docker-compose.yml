services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-ecto://postgres:postgres@db/squad_ops_dev}
      - AZURE_ORG_URL=${AZURE_ORG_URL}
      - AZURE_PAT=${AZURE_PAT}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-dev_secret_key_base_change_in_production_min_64_chars}
      - PHX_HOST=${PHX_HOST:-localhost}
      - PORT=4000
      - MIX_ENV=dev
    volumes:
      - .:/app
      - mix_deps:/app/deps
      - mix_build:/app/_build
      - node_modules:/app/assets/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: mix phx.server

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: squad_ops_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mix_deps:
  mix_build:
  node_modules:
